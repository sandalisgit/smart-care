<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Care — Patients</title>
<link rel="stylesheet" href="../../css/app.css">
</head>
<body>
<div class="app-layout">
    <nav class="sidebar" id="sidebar"></nav>

    <nav class="sub-sidebar" id="sub-sidebar"></nav>
  <div class="main-content">
    <div class="topbar">
      <span class="topbar-title" id="topbar-breadcrumb">Patient Management</span>
      <div class="topbar-right" id="topbar-user"></div>
    </div>
    <div class="page-body">

      <!-- Action bar -->
      <div class="flex items-center justify-between mb-4">
        <div class="search-bar" style="flex:1;max-width:400px">
          <input type="text" id="search-input" class="form-control" placeholder="Search by name, phone, patient code...">
        </div>
        <div class="flex gap-2" style="margin-left:16px">
          <button class="btn btn-primary" onclick="Modal.open('modal-register')">➕ Register Patient</button>
        </div>
      </div>

      <!-- Patients Table -->
      <div class="card">
        <div class="card-header"><h3>Patient Records</h3><span id="patient-count" class="text-muted text-sm"></span></div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr><th>Patient ID</th><th>Full Name</th><th>DOB</th><th>Gender</th><th>Blood Group</th><th>Phone</th><th>Insurance</th><th>Status</th><th>Actions</th></tr>
            </thead>
            <tbody id="patients-tbody">
              <tr><td colspan="9" class="text-center" style="padding:24px">Loading patients...</td></tr>
            </tbody>
          </table>
        </div>
      </div>

    </div>
  </div>
</div>

<!-- REGISTER MODAL -->
<div id="modal-register" class="modal-overlay">
  <div class="modal" style="max-width:700px">
    <div class="modal-header">
      <h3>Register New Patient</h3>
      <button onclick="Modal.close('modal-register')" class="btn btn-secondary btn-sm">✕</button>
    </div>
    <div class="modal-body">
      <form id="register-form">
        <div class="form-grid">
          <div class="form-group">
            <label class="form-label">First Name <span class="required">*</span></label>
            <input name="firstName" class="form-control" required>
          </div>
          <div class="form-group">
            <label class="form-label">Last Name <span class="required">*</span></label>
            <input name="lastName" class="form-control" required>
          </div>
          <div class="form-group">
            <label class="form-label">Date of Birth <span class="required">*</span></label>
            <input name="dateOfBirth" type="date" class="form-control" required>
          </div>
          <div class="form-group">
            <label class="form-label">Gender <span class="required">*</span></label>
            <select name="gender" class="form-control" required>
              <option value="">Select</option>
              <option>Male</option><option>Female</option><option>Other</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">Blood Group</label>
            <select name="bloodGroup" class="form-control">
              <option value="">Unknown</option>
              <option>O+</option><option>O-</option><option>A+</option><option>A-</option>
              <option>B+</option><option>B-</option><option>AB+</option><option>AB-</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">Phone <span class="required">*</span></label>
            <input name="phone" class="form-control" placeholder="+94771234567" required>
          </div>
          <div class="form-group">
            <label class="form-label">Email</label>
            <input name="email" type="email" class="form-control">
          </div>
          <div class="form-group">
            <label class="form-label">National ID</label>
            <input name="nationalId" class="form-control">
          </div>
          <div class="form-group form-full">
            <label class="form-label">Address</label>
            <input name="address" class="form-control">
          </div>
          <div class="form-group">
            <label class="form-label">City</label>
            <input name="city" class="form-control">
          </div>
          <div class="form-group">
            <label class="form-label">Emergency Contact Name</label>
            <input name="emergencyContactName" class="form-control">
          </div>
          <div class="form-group">
            <label class="form-label">Emergency Contact Phone</label>
            <input name="emergencyContactPhone" class="form-control">
          </div>
          <div class="form-group">
            <label class="form-label">Insurance Provider</label>
            <input name="insuranceProvider" class="form-control">
          </div>
          <div class="form-group form-full">
            <label class="form-label">Known Allergies <span style="color:var(--danger);font-size:11px">(encrypted & stored securely)</span></label>
            <input name="allergies" class="form-control" placeholder="e.g. Penicillin, Peanuts or None">
          </div>
          <div class="form-group form-full">
            <label class="form-label">Chronic Conditions</label>
            <input name="chronicConditions" class="form-control" placeholder="e.g. Diabetes, Hypertension or None">
          </div>
        </div>
      </form>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="Modal.close('modal-register')">Cancel</button>
      <button id="reg-submit-btn" class="btn btn-primary" onclick="registerPatient()">Register Patient</button>
    </div>
  </div>
</div>

<script src="../../js/app.js"></script>
<script src="../../js/sidebar.js"></script>
<script>
let allPatients = [];

Auth.requireAuth();
Sidebar.render('patients', 'patients-list');

async function loadPatients(query = '') {
  const url = query ? `/patients?q=${encodeURIComponent(query)}&limit=100` : '/patients?limit=50';
  const res = await API.get(url);
  if (res?.success) {
    allPatients = res.data;
    document.getElementById('patient-count').textContent = `${res.data.length} record(s)`;
    renderPatients(res.data);
  }
}

function renderPatients(patients) {
  renderTable('patients-tbody', patients, [
    { key: 'patientCode', render: r => `<strong>${r.patientCode}</strong>` },
    { key: 'firstName', render: r => `${r.firstName} ${r.lastName}` },
    { key: 'dateOfBirth', render: r => fmtDate(r.dateOfBirth) },
    { key: 'gender' },
    { key: 'bloodGroup', render: r => `<span class="badge badge-info">${r.bloodGroup || '—'}</span>` },
    { key: 'phone' },
    { key: 'allergies', render: r => r.allergies && r.allergies !== 'None' ? `<span class="badge badge-danger">⚠ ${r.allergies}</span>` : '<span class="text-muted">None</span>' },
    { key: 'status', render: r => statusBadge(r.status) },
    { key: 'actions', render: r => `
      <div class="flex gap-2">
        <a href="profile.html?id=${r.patientId}" class="btn btn-sm btn-secondary">👁 View</a>
        <button class="btn btn-sm btn-primary" onclick="bookAppt(${r.patientId})">📅 Book</button>
      </div>` }
  ]);
}

async function registerPatient() {
  const btn = document.getElementById('reg-submit-btn');
  const data = getFormData('register-form');

  // Basic validation
  if (!data.firstName || !data.lastName || !data.phone) {
    Toast.error('First name, last name, and phone are required');
    return;
  }

  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> Registering...';

  const res = await API.post('/patients', data);
  btn.disabled = false;
  btn.textContent = 'Register Patient';

  if (res?.success) {
    Toast.success(`Patient registered! Code: ${res.data.patientCode}`);
    Modal.close('modal-register');
    clearForm('register-form');
    loadPatients();
  } else {
    Toast.error(res?.error || 'Registration failed');
  }
}

function bookAppt(patientId) {
  window.location.href = `../appointments/book.html?patientId=${patientId}`;
}

// Search with debounce
const doSearch = debounce(q => loadPatients(q), 350);
document.getElementById('search-input').addEventListener('input', e => doSearch(e.target.value));

loadPatients();
</script>
</body>
</html>
