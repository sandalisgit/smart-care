<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Care — Patient Profile</title>
<link rel="stylesheet" href="../../css/app.css">
<style>
/* ── Profile header ─────────────────────────────────────────────── */
.profile-header {
  background: linear-gradient(135deg, #0f2540 0%, #1B8A8F 100%);
  color: #fff;
  padding: 28px 32px;
  border-radius: 12px;
  margin-bottom: 20px;
  display: flex;
  align-items: center;
  gap: 20px;
}
.avatar {
  width: 72px; height: 72px;
  border-radius: 50%;
  background: rgba(255,255,255,0.2);
  display: flex; align-items: center; justify-content: center;
  font-size: 28px; font-weight: 800;
  border: 3px solid rgba(255,255,255,0.4);
  flex-shrink: 0;
}
.profile-name { font-size: 22px; font-weight: 800; margin-bottom: 4px; }
.profile-code { font-size: 13px; opacity: .8; font-family: monospace; }
.p-badge {
  display: inline-block; padding: 2px 10px; border-radius: 20px;
  font-size: 11px; font-weight: 700; margin-left: 8px;
}
.p-badge-active   { background: #4CAF50; color: #fff; }
.p-badge-inactive { background: #FF9800; color: #fff; }
.p-badge-deceased { background: #9E9E9E; color: #fff; }

/* ── Info grid ──────────────────────────────────────────────────── */
.info-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(210px, 1fr));
  gap: 14px;
  margin-bottom: 20px;
}
.info-card {
  background: #fff; border-radius: 10px;
  padding: 14px 16px; border: 1px solid #e8edf2;
}
.info-label {
  font-size: 11px; color: #6c757d; text-transform: uppercase;
  letter-spacing: .5px; margin-bottom: 4px;
}
.info-value { font-size: 14px; font-weight: 600; color: #0f2540; }

/* ── Vital grid ─────────────────────────────────────────────────── */
.vital-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
  gap: 12px; margin-bottom: 16px;
}
.vital-box {
  background: #f4f8fb; border-radius: 8px;
  padding: 12px; text-align: center;
}
.vital-val  { font-size: 20px; font-weight: 800; color: #0f2540; }
.vital-lbl  { font-size: 11px; color: #6c757d; margin-top: 2px; }

/* ── Section title ──────────────────────────────────────────────── */
.section-title {
  font-size: 15px; font-weight: 700; color: #0f2540;
  margin: 20px 0 12px;
  padding-bottom: 8px;
  border-bottom: 2px solid #e8edf2;
  display: flex; align-items: center; gap: 8px;
}

/* ── History table ──────────────────────────────────────────────── */
.history-table { width: 100%; border-collapse: collapse; font-size: 13px; }
.history-table th {
  background: #f4f8fb; padding: 10px 12px; text-align: left;
  font-size: 11px; color: #6c757d; text-transform: uppercase; letter-spacing: .5px;
}
.history-table td { padding: 10px 12px; border-bottom: 1px solid #f0f0f0; vertical-align: top; }
.history-table tr:hover td { background: #f9fbfc; }

.actions-bar { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
.empty-state { text-align: center; padding: 32px; color: #6c757d; font-size: 13px; }
.write-only  { display: none; }
</style>
</head>
<body>
<div class="app-layout">
  <nav class="sidebar" id="sidebar"></nav>
  <nav class="sub-sidebar" id="sub-sidebar"></nav>

  <div class="main-content">
    <div class="topbar">
      <span class="topbar-title" id="topbar-breadcrumb">Patient Profile</span>
      <div class="topbar-right" id="topbar-user"></div>
    </div>
    <div class="page-body" id="page-body">
      <div style="text-align:center;padding:60px;color:#6c757d">Loading patient profile…</div>
    </div>
  </div>
</div>

<!-- ═══════════════════════════════════════════════════════════
     EDIT PROFILE MODAL
════════════════════════════════════════════════════════════════ -->
<div id="modal-edit" class="modal-overlay">
  <div class="modal" style="max-width:720px">
    <div class="modal-header">
      <h3>✏️ Edit Patient Profile</h3>
      <button onclick="Modal.close('modal-edit')" class="btn btn-secondary btn-sm">✕</button>
    </div>
    <div class="modal-body">
      <form id="edit-form" autocomplete="off">

        <!-- Personal -->
        <div style="font-size:12px;font-weight:700;color:var(--gray);text-transform:uppercase;
                    letter-spacing:.5px;margin-bottom:10px">Personal Information</div>
        <div class="form-grid">
          <div class="form-group">
            <label class="form-label">First Name <span class="required">*</span></label>
            <input name="firstName" id="ef-firstName" class="form-control" required>
          </div>
          <div class="form-group">
            <label class="form-label">Last Name <span class="required">*</span></label>
            <input name="lastName" id="ef-lastName" class="form-control" required>
          </div>
          <div class="form-group">
            <label class="form-label">Date of Birth</label>
            <input name="dateOfBirth" id="ef-dob" type="date" class="form-control">
          </div>
          <div class="form-group">
            <label class="form-label">Gender</label>
            <select name="gender" id="ef-gender" class="form-control">
              <option value="">Select</option>
              <option>Male</option><option>Female</option><option>Other</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">Blood Group</label>
            <select name="bloodGroup" id="ef-bloodGroup" class="form-control">
              <option value="">Unknown</option>
              <option>O+</option><option>O-</option>
              <option>A+</option><option>A-</option>
              <option>B+</option><option>B-</option>
              <option>AB+</option><option>AB-</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">Phone <span class="required">*</span></label>
            <input name="phone" id="ef-phone" class="form-control" required>
          </div>
          <div class="form-group">
            <label class="form-label">Email</label>
            <input name="email" id="ef-email" type="email" class="form-control">
          </div>
          <div class="form-group">
            <label class="form-label">Status</label>
            <select name="status" id="ef-status" class="form-control">
              <option value="Active">Active</option>
              <option value="Inactive">Inactive</option>
              <option value="Deceased">Deceased</option>
            </select>
          </div>
          <div class="form-group form-full">
            <label class="form-label">Address</label>
            <input name="address" id="ef-address" class="form-control">
          </div>
          <div class="form-group">
            <label class="form-label">City</label>
            <input name="city" id="ef-city" class="form-control">
          </div>
          <div class="form-group">
            <label class="form-label">State / Province</label>
            <input name="state" id="ef-state" class="form-control">
          </div>
          <div class="form-group">
            <label class="form-label">Postal Code</label>
            <input name="postalCode" id="ef-postalCode" class="form-control">
          </div>
        </div>

        <!-- Clinical -->
        <div style="font-size:12px;font-weight:700;color:var(--gray);text-transform:uppercase;
                    letter-spacing:.5px;margin:16px 0 10px;border-top:1px solid var(--border);
                    padding-top:14px">Clinical Information</div>
        <div class="form-grid">
          <div class="form-group">
            <label class="form-label">
              Allergies
              <span style="color:var(--danger);font-size:10px">(encrypted)</span>
            </label>
            <input name="allergies" id="ef-allergies" class="form-control"
                   placeholder="e.g. Penicillin — or None">
          </div>
          <div class="form-group">
            <label class="form-label">Chronic Conditions</label>
            <input name="chronicConditions" id="ef-chronicConditions" class="form-control"
                   placeholder="e.g. Diabetes — or None">
          </div>
          <div class="form-group">
            <label class="form-label">Height (cm)</label>
            <input name="height" id="ef-height" type="number" step="0.1"
                   min="30" max="250" class="form-control">
          </div>
          <div class="form-group">
            <label class="form-label">Weight (kg)</label>
            <input name="weight" id="ef-weight" type="number" step="0.1"
                   min="1" max="500" class="form-control">
          </div>
        </div>

        <!-- Insurance & Emergency -->
        <div style="font-size:12px;font-weight:700;color:var(--gray);text-transform:uppercase;
                    letter-spacing:.5px;margin:16px 0 10px;border-top:1px solid var(--border);
                    padding-top:14px">Insurance &amp; Emergency Contact</div>
        <div class="form-grid">
          <div class="form-group">
            <label class="form-label">Insurance Provider</label>
            <input name="insuranceProvider" id="ef-insuranceProvider" class="form-control">
          </div>
          <div class="form-group">
            <label class="form-label">Policy Number</label>
            <input name="insurancePolicyNumber" id="ef-insurancePolicyNumber"
                   class="form-control">
          </div>
          <div class="form-group">
            <label class="form-label">Emergency Contact Name</label>
            <input name="emergencyContactName" id="ef-emergencyContactName"
                   class="form-control">
          </div>
          <div class="form-group">
            <label class="form-label">Emergency Contact Phone</label>
            <input name="emergencyContactPhone" id="ef-emergencyContactPhone"
                   class="form-control">
          </div>
        </div>

      </form>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="Modal.close('modal-edit')">Cancel</button>
      <button id="edit-submit-btn" class="btn btn-primary" onclick="saveProfile()">
        Save Changes
      </button>
    </div>
  </div>
</div>

<script src="../../js/app.js"></script>
<script src="../../js/sidebar.js"></script>
<script>
/* ════════════════════════════════════════════════════════════════
   Patient Profile — SmartCare Hospital ERP
   FR-07: Update contact info
   FR-71: RBAC (reads: all staff; writes: Admin + Receptionist)
   FR-77/78: Mutations audited server-side
   ════════════════════════════════════════════════════════════════ */

const WRITE_ROLES  = ['System Admin', 'Hospital Admin', 'Receptionist'];
const params       = new URLSearchParams(window.location.search);
const patientId    = params.get('id');
let   patientData  = null;

Auth.requireAuth();
Sidebar.render('patients', 'patients-list');

// FR-71: Determine write permission for current user
const canWrite = WRITE_ROLES.includes(Auth.getUser().role);

if (!patientId) {
  document.getElementById('page-body').innerHTML =
    '<div class="empty-state">❌ No patient ID specified. <a href="list.html">Back to list</a></div>';
}

// ── Load profile ──────────────────────────────────────────────────

async function loadProfile() {
  const res = await API.get(`/patients/${patientId}`);
  if (!res?.success) {
    document.getElementById('page-body').innerHTML =
      `<div class="empty-state">❌ Patient not found. <a href="list.html">Back to list</a></div>`;
    return;
  }
  patientData = res.data.patient || res.data;
  renderProfile(patientData);
  loadHistory();
}

function renderProfile(p) {
  const initials = ((p.firstName || '?')[0] + (p.lastName || '?')[0]).toUpperCase();
  const age      = p.dateOfBirth
    ? Math.floor((Date.now() - new Date(p.dateOfBirth)) / 31557600000)
    : '—';
  const badgeClass =
    p.status === 'Active'   ? 'p-badge-active'   :
    p.status === 'Deceased' ? 'p-badge-deceased'  : 'p-badge-inactive';

  document.getElementById('topbar-breadcrumb').textContent =
    `${p.firstName} ${p.lastName} — Profile`;

  // Show write controls to permitted roles
  const writeBtns = canWrite
    ? `<button class="btn btn-secondary write-only" style="display:inline-flex"
          onclick="openEditModal()">✏️ Edit Profile</button>
       <button class="btn btn-danger write-only" style="display:inline-flex"
          onclick="deletePatient()">🗑 Deactivate</button>`
    : '';

  document.getElementById('page-body').innerHTML = `
    <!-- Header -->
    <div class="profile-header">
      <div class="avatar">${initials}</div>
      <div>
        <div class="profile-name">
          ${p.firstName} ${p.lastName}
          <span class="p-badge ${badgeClass}">${p.status}</span>
        </div>
        <div class="profile-code">
          ${p.patientCode} · ${age} yrs · ${p.gender || '—'} · ${p.bloodGroup || '—'}
        </div>
        <div style="margin-top:8px;font-size:12px;opacity:.75">
          📅 Registered:
          ${p.registrationDate
            ? new Date(p.registrationDate).toLocaleDateString('en-GB',
                {day:'2-digit',month:'short',year:'numeric'})
            : '—'}
        </div>
      </div>
    </div>

    <!-- Action Buttons -->
    <div class="actions-bar">
      <button class="btn btn-primary"
        onclick="window.location.href='../appointments/book.html?patientId=${p.patientId}'">
        📅 Book Appointment
      </button>
      ${writeBtns}
      <button class="btn btn-secondary" onclick="downloadReport()">
        📥 Download PDF
      </button>
      <a href="list.html" class="btn btn-secondary">← Back to List</a>
    </div>

    <!-- Personal Info -->
    <div class="section-title">👤 Personal Information</div>
    <div class="info-grid">
      <div class="info-card">
        <div class="info-label">Phone</div>
        <div class="info-value">${p.phone || '—'}</div>
      </div>
      <div class="info-card">
        <div class="info-label">Email</div>
        <div class="info-value">${p.email || '—'}</div>
      </div>
      <div class="info-card">
        <div class="info-label">Date of Birth</div>
        <div class="info-value">
          ${p.dateOfBirth
            ? new Date(p.dateOfBirth).toLocaleDateString('en-GB',
                {day:'2-digit',month:'short',year:'numeric'})
            : '—'}
        </div>
      </div>
      <div class="info-card">
        <div class="info-label">NIC / Passport</div>
        <div class="info-value">${p.nationalId || '—'}</div>
      </div>
      <div class="info-card">
        <div class="info-label">Address</div>
        <div class="info-value">
          ${[p.address, p.city, p.state].filter(Boolean).join(', ') || '—'}
        </div>
      </div>
      <div class="info-card">
        <div class="info-label">Country</div>
        <div class="info-value">${p.country || 'Sri Lanka'}</div>
      </div>
    </div>

    <!-- Clinical Info -->
    <div class="section-title">🏥 Clinical Information</div>
    <div class="vital-grid">
      <div class="vital-box">
        <div class="vital-val">${p.bloodGroup || '—'}</div>
        <div class="vital-lbl">Blood Group</div>
      </div>
      <div class="vital-box">
        <div class="vital-val">${p.height ? p.height + ' cm' : '—'}</div>
        <div class="vital-lbl">Height</div>
      </div>
      <div class="vital-box">
        <div class="vital-val">${p.weight ? p.weight + ' kg' : '—'}</div>
        <div class="vital-lbl">Weight</div>
      </div>
      <div class="vital-box">
        <div class="vital-val">${p.bloodPressure ? p.bloodPressure + ' mmHg' : '—'}</div>
        <div class="vital-lbl">Blood Pressure</div>
      </div>
    </div>
    <div class="info-grid">
      <div class="info-card">
        <div class="info-label">Allergies</div>
        <div class="info-value"
             style="color:${p.allergies && p.allergies !== 'None' ? '#c62828' : 'inherit'}">
          ${p.allergies || 'None known'}
        </div>
      </div>
      <div class="info-card">
        <div class="info-label">Chronic Conditions</div>
        <div class="info-value">${p.chronicConditions || 'None'}</div>
      </div>
    </div>

    <!-- Insurance & Emergency -->
    <div class="section-title">🛡️ Insurance &amp; Emergency Contact</div>
    <div class="info-grid">
      <div class="info-card">
        <div class="info-label">Insurance Provider</div>
        <div class="info-value">${p.insuranceProvider || 'None'}</div>
      </div>
      <div class="info-card">
        <div class="info-label">Policy Number</div>
        <div class="info-value">${p.insurancePolicyNumber || '—'}</div>
      </div>
      <div class="info-card">
        <div class="info-label">Emergency Contact</div>
        <div class="info-value">${p.emergencyContactName || '—'}</div>
      </div>
      <div class="info-card">
        <div class="info-label">Emergency Phone</div>
        <div class="info-value">${p.emergencyContactPhone || '—'}</div>
      </div>
    </div>

    <!-- Medical History -->
    <div class="section-title">📋 Medical History</div>
    <div id="history-section">
      <div class="empty-state">Loading history…</div>
    </div>
  `;
}

// ── Medical history ──────────────────────────────────────────────

async function loadHistory() {
  const res = await API.get(`/patients/${patientId}/history`);
  const el  = document.getElementById('history-section');
  if (!el) return;

  const appts = res?.data?.appointments || res?.data || [];
  if (!Array.isArray(appts) || !appts.length) {
    el.innerHTML = '<div class="empty-state">No medical history records found.</div>';
    return;
  }

  const rows = appts.map(r => `
    <tr>
      <td>${r.appointment_date
        ? new Date(r.appointment_date).toLocaleDateString('en-GB',
            {day:'2-digit',month:'short',year:'numeric'})
        : '—'}</td>
      <td><span class="badge badge-info">${r.appointment_type || '—'}</span></td>
      <td>${r.reason || '—'}</td>
      <td><span class="badge ${
        r.status === 'Completed' ? 'badge-green' :
        r.status === 'Cancelled' ? 'badge-gray'  :
        r.status === 'Scheduled' ? 'badge-info'  : 'badge-yellow'
      }">${r.status || '—'}</span></td>
      <td>${r.doctor_name || '—'}</td>
    </tr>`).join('');

  el.innerHTML = `
    <table class="history-table">
      <thead>
        <tr>
          <th>Date</th><th>Type</th><th>Reason</th>
          <th>Status</th><th>Doctor</th>
        </tr>
      </thead>
      <tbody>${rows}</tbody>
    </table>`;
}

// ── Edit modal ────────────────────────────────────────────────────

function openEditModal() {
  if (!patientData) return;
  const p = patientData;

  // Populate all form fields
  const setVal = (id, val) => {
    const el = document.getElementById(id);
    if (el) el.value = val ?? '';
  };

  setVal('ef-firstName',              p.firstName);
  setVal('ef-lastName',               p.lastName);
  setVal('ef-phone',                  p.phone);
  setVal('ef-email',                  p.email);
  setVal('ef-gender',                 p.gender);
  setVal('ef-bloodGroup',             p.bloodGroup);
  setVal('ef-status',                 p.status);
  setVal('ef-address',                p.address);
  setVal('ef-city',                   p.city);
  setVal('ef-state',                  p.state);
  setVal('ef-postalCode',             p.postalCode);
  setVal('ef-allergies',              p.allergies);
  setVal('ef-chronicConditions',      p.chronicConditions);
  setVal('ef-height',                 p.height ?? '');
  setVal('ef-weight',                 p.weight ?? '');
  setVal('ef-insuranceProvider',      p.insuranceProvider);
  setVal('ef-insurancePolicyNumber',  p.insurancePolicyNumber);
  setVal('ef-emergencyContactName',   p.emergencyContactName);
  setVal('ef-emergencyContactPhone',  p.emergencyContactPhone);

  // Date: convert from timestamp/ISO to yyyy-MM-dd
  if (p.dateOfBirth) {
    const d = new Date(p.dateOfBirth);
    const iso = d.toISOString().split('T')[0];
    setVal('ef-dob', iso);
  }

  Modal.open('modal-edit');
}

async function saveProfile() {
  const data = getFormData('edit-form');

  if (!data.firstName?.trim()) { Toast.error('First name is required.'); return; }
  if (!data.phone?.trim())     { Toast.error('Phone number is required.'); return; }

  // Parse numeric fields
  ['height','weight'].forEach(k => {
    if (data[k] === '' || data[k] == null) delete data[k];
    else data[k] = parseFloat(data[k]);
  });

  setLoading('edit-submit-btn', true, 'Saving…');
  const res = await API.put(`/patients/${patientId}`, data);
  setLoading('edit-submit-btn', false, 'Save Changes');

  if (res?.success) {
    Toast.success('Profile updated successfully.');
    Modal.close('modal-edit');
    patientData = res.data || patientData;
    renderProfile(patientData);
    // Reload history in case status changed
    loadHistory();
  } else {
    Toast.error(res?.error || 'Update failed. Please try again.');
  }
}

// ── Delete (deactivate) ───────────────────────────────────────────

async function deletePatient() {
  if (!patientData) return;
  const name = `${patientData.firstName} ${patientData.lastName}`;

  // NFR-24: Confirmation before irreversible action
  if (!confirm(
    `Deactivate patient "${name}" (${patientData.patientCode})?\n\n` +
    `This sets the patient status to Inactive. All medical history is preserved.`
  )) return;

  const res = await API.delete(`/patients/${patientId}`);
  if (res?.success) {
    Toast.success('Patient deactivated.');
    setTimeout(() => window.location.href = 'list.html', 1500);
  } else {
    Toast.error(res?.error || 'Could not deactivate patient.');
  }
}

// ── PDF report download ───────────────────────────────────────────

async function downloadReport() {
  if (!patientData) return;
  const token = localStorage.getItem('sc_token');
  const code  = patientData.patientCode;
  Toast.info('Generating PDF report…');
  try {
    const response = await fetch(
      `/smart-care/api/reports/patient/${encodeURIComponent(code)}/emr`,
      { headers: { Authorization: 'Bearer ' + token, Accept: 'application/pdf' } }
    );
    if (response.ok && response.headers.get('content-type')?.includes('pdf')) {
      const blob = await response.blob();
      const url  = URL.createObjectURL(blob);
      const a    = document.createElement('a');
      a.href = url;
      a.download = `SmartCare_Report_${code}.pdf`;
      document.body.appendChild(a); a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
      Toast.success('Report downloaded!');
    } else {
      Toast.error('PDF generation unavailable. Contact administrator.');
    }
  } catch (e) {
    Toast.error('Download failed: ' + e.message);
  }
}

// ── Init ──────────────────────────────────────────────────────────

if (patientId) loadProfile();
</script>
</body>
</html>
